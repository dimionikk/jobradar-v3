services:
  app:
    build: .
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://jobradar_own:${POSTGRES_PASSWORD}@db:5432/jobradar-db
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
    depends_on:
      - db
      - redis
    restart: always
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=jobradar_own
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=jobradar-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  redis:
    image: valkey/valkey:8
    restart: always
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:Z
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: always
volumes:
  postgres_data: