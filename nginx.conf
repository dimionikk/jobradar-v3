server {
    listen 80;
    server_name 178-104-16-233.nip.io app.178-104-16-233.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 178-104-16-233.nip.io;

    ssl_certificate /etc/letsencrypt/live/178-104-16-233.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/178-104-16-233.nip.io/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name app.178-104-16-233.nip.io;

    ssl_certificate /etc/letsencrypt/live/178-104-16-233.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/178-104-16-233.nip.io/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://178-104-16-233.nip.io; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}